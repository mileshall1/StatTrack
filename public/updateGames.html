<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>StatTrack - Update</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x50" href="public/logo.png">
</head>
<body>

  <div class="nav">
    <a href="/index.html">📊StatTrack</a>
    <a href="/public/addGames.html">Add Game</a>
    <a href="/public/serverGames.html">Saved Games</a>
    <a href="/public/updateGames.html">Update Game</a>
    <a href="https://github.com/mileshall1/StatTrack" target="_blank">
      <img src="/public/gitwhite.png" alt="GitHub">
    </a>
  </div>

  <div class="title">
    <h1>Update Game</h1>
  </div>

  <form id="updateForm" class="form-container">
   <input type="text" id="id" placeholder="Game ID" readonly required>
    <input type="text" id="player" placeholder="Player Name" required>
    <input type="date" id="date" required>
    <input type="text" id="opponent" placeholder="Opponent (e.g. LAL)" required>
    <input type="number" id="points" placeholder="Points" required>
    <input type="number" id="rebounds" placeholder="Rebounds" required>
    <input type="number" id="assists" placeholder="Assists" required>
    <button type="submit" class="button">UPDATE GAME</button>
  </form>

  <div class="saved-wrap">
    <div id="emptyMsg" class="empty-msg" style="display:none;">
      No saved games yet.
    </div>

    <div class="table-wrap">
      <table class="saved-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>Player</th>
            <th>Opponent</th>
            <th>PTS</th>
            <th>REB</th>
            <th>AST</th>
          </tr>
        </thead>
        <tbody id="gamesBody"></tbody>
      </table>
    </div>
  </div>

  <script>
  const form = document.getElementById("updateForm");
  const body = document.getElementById("gamesBody");
  const emptyMsg = document.getElementById("emptyMsg");

  const idInput = document.getElementById("id");
  const playerInput = document.getElementById("player");
  const dateInput = document.getElementById("date");
  const opponentInput = document.getElementById("opponent");
  const pointsInput = document.getElementById("points");
  const reboundsInput = document.getElementById("rebounds");
  const assistsInput = document.getElementById("assists");

  const buildApiUrl = (path) => {
    const isLocalExpress = window.location.protocol.startsWith("http") && window.location.port === "3000";
    if (isLocalExpress) {
      return path;
    }
    return `http://localhost:3000${path}`;
  };

  function fillForm(game) {
    idInput.value = game._id || "";
    playerInput.value = game.player || "";
    dateInput.value = game.date || "";
    opponentInput.value = game.opponent || "";
    pointsInput.value = game.points ?? 0;
    reboundsInput.value = game.rebounds ?? 0;
    assistsInput.value = game.assists ?? 0;
  }

  const render = async () => {
    try {
      const response = await fetch(buildApiUrl("/api/games"));
      if (!response.ok) {
        throw new Error("Failed to load games");
      }

      const games = await response.json();
      body.innerHTML = "";

      if (!games.length) {
        emptyMsg.style.display = "block";
        return;
      }

      emptyMsg.style.display = "none";

      for (const g of games) {
        const tr = document.createElement("tr");
        tr.style.cursor = "pointer";

        tr.addEventListener("click", () => {
          fillForm(g);

          document.querySelectorAll("#gamesBody tr").forEach(row => {
            row.style.backgroundColor = "";
          });
          tr.style.backgroundColor = "rgba(255,255,255,0.12)";
        });

        const idCell = document.createElement("td");
        idCell.setAttribute("data-label", "ID");
        idCell.textContent = g._id || "";

        const dateCell = document.createElement("td");
        dateCell.setAttribute("data-label", "Date");
        dateCell.textContent = g.date || "";

        const playerCell = document.createElement("td");
        playerCell.setAttribute("data-label", "Player");
        playerCell.textContent = g.player || "";

        const oppCell = document.createElement("td");
        oppCell.setAttribute("data-label", "Opponent");
        oppCell.textContent = g.opponent || "";

        const ptsCell = document.createElement("td");
        ptsCell.setAttribute("data-label", "PTS");
        ptsCell.textContent = g.points ?? 0;

        const rebCell = document.createElement("td");
        rebCell.setAttribute("data-label", "REB");
        rebCell.textContent = g.rebounds ?? 0;

        const astCell = document.createElement("td");
        astCell.setAttribute("data-label", "AST");
        astCell.textContent = g.assists ?? 0;

        tr.appendChild(idCell);
        tr.appendChild(dateCell);
        tr.appendChild(playerCell);
        tr.appendChild(oppCell);
        tr.appendChild(ptsCell);
        tr.appendChild(rebCell);
        tr.appendChild(astCell);

        body.appendChild(tr);
      }
    } catch {
      body.innerHTML = "";
      emptyMsg.style.display = "block";
      emptyMsg.textContent = "Unable to load saved games.";
    }
  };

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const id = idInput.value;
    const player = playerInput.value.trim();
    const date = dateInput.value;
    const opponent = opponentInput.value.trim();
    const points = Number(pointsInput.value);
    const rebounds = Number(reboundsInput.value);
    const assists = Number(assistsInput.value);

    if (!id) {
      alert("Please click a game row first.");
      return;
    }

    if (!player || !date || !opponent) {
      alert("Please fill out all fields.");
      return;
    }

    if (points < 0 || rebounds < 0 || assists < 0) {
      alert("Stats cannot be negative.");
      return;
    }

    const payload = {
      player,
      date,
      opponent,
      points,
      rebounds,
      assists
    };

    let response;
    try {
      response = await fetch(buildApiUrl(`/api/games/${id}`), {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
    } catch {
      alert("Could not connect to API. Make sure your Express server is running on http://localhost:3000.");
      return;
    }

    if (response.status === 404) {
      alert("Game ID not found.");
      return;
    }

    if (!response.ok) {
      alert("Could not update game. Please try again.");
      return;
    }

    alert("Game updated successfully.");
    form.reset();
    render();
  });

  render();
</script>

  <footer class="footer" style="color: white;">
    <p>© 2025 StatTrack - Built by Kelechi & Miles</p>
    <a href="https://github.com/mileshall1/StatTrack" target="_blank">
      <img src="/public/gitwhite.png" alt="GitHub" width="50">
    </a>
  </footer>
</body>
</html>
